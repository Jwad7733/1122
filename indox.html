<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-adsense-account" content="ca-pub-9178907045493989">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9178907045493989" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty sticker validation</title>
    
    <!-- المكتبات المطلوبة -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* التنسيقات الأساسية */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; color: #333; line-height: 1.6; padding-bottom: 80px; }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; background-color: #fff; }
        .header-content { text-align: left; margin-bottom: 30px; }
        .logo { width: 100px; margin-bottom: 10px; }
        .breadcrumb { font-size: 0.9rem; color: #777; margin: 10px 0 15px 0; }
        .breadcrumb a { color: #000 !important; text-decoration: none; }
        h2 { color: #2c3e50; font-size: 1.5rem; font-weight: 700; text-align: center; margin: 20px 0 40px 0; }
        .main-description { text-align: center; font-size: 1rem; line-height: 1.8; max-width: 800px; margin: 20px auto 30px auto; }
        
        /* تعديل الحواف: دائري من اليسار وحاد من اليمين */
        .input-container {
            width: 45%;
            max-width: 350px;
            display: flex;
            align-items: center;
            border: 2px solid #cccccc;
            border-radius: 25px 0 0 25px; /* (أعلى يسار) (أعلى يمين) (أسفل يمين) (أسفل يسار) */
            overflow: hidden; /* لضمان قص العناصر الداخلية وفقاً للحواف */
            margin: 10px auto;
            height: 45px;
            background: white;
        }

        .input-container input {
            flex: 1;
            padding: 0 15px;
            border: none;
            font-size: 0.9rem;
            outline: none;
            text-align: left;
        }

        .btn-action {
            height: 100%;
            border: none;
            background-color: #a8822b;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        .scan-btn {
            padding: 0 10px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .check-btn {
            padding: 0 20px;
            font-size: 0.9rem;
            min-width: 70px;
        }

        .btn-action:hover { opacity: 0.9; }

        #reader { width: 100%; max-width: 400px; margin: 10px auto; display: none; border: 2px solid #a8822b; border-radius: 10px; overflow: hidden; }
        #result { margin: 20px 0; min-height: 40px; font-weight: bold; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .banner { width: 100%; max-height: 200px; object-fit: cover; margin: 20px 0; }
        
        .links { display: flex; justify-content: space-between; margin-top: 20px; text-align: left; padding-left: 40px; }
        .links-section { flex: 1; margin-left: 15px; text-align: left; }
        .links-section h2 { font-size: 1.2rem; margin-bottom: 8px; color: #2c3e50; }
        .links-section a { color: #333; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 4px; }
        
        @media (max-width: 768px) { .input-container { width: 85%; } .links { flex-direction: column; padding-left: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-content">
            <img src="https://i.postimg.cc/zvf2c47L/image.png" alt="Logo" class="logo">
            <div class="breadcrumb"><a href="https://arabcomputers.com.sa/">Home</a> / <a href="https://arabcomputers.com.sa/check-sticker/">Check sticker</a></div>
        </div>

        <h2>Warranty sticker validation</h2>
        <p class="main-description">Check if the warranty sticker on your product is genuine.<br>تأكد إذا كان ملصق الضمان الموجود على منتجك هو ملصق أصلي أو مزيف</p>

        <div id="reader"></div>

        <div class="input-container">
            <input type="text" id="numberInput" placeholder="XXXXXX">
            <button class="btn-action scan-btn" onclick="startScanning()" title="Scan QR">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M4 4h3V2H2v5h2V4zm14-2v2h3v3h2V2h-5zM2 22h5v-2H4v-3H2v5zm20-5v3h-3v2h5v-5h-2zM7 7h10v10H7V7zm2 2v6h6V9H9z"/></svg>
            </button>
            <button class="btn-action check-btn" id="checkBtn" onclick="validateForm()">Check</button>
        </div>

        <div id="result"></div>
        
        <img src="https://i.ibb.co/3m3r1TWK/Warranty-sticker-26.jpg" alt="Banner" class="banner">
    </div>

    <div class="links">
        <div class="links-section">
            <h2>Useful Links</h2>
            <a href="https://arabcomputers.com.sa/">Home</a>
            <a href="https://arabcomputers.com.sa/contact/">Contact Us</a>
        </div>
        <div class="links-section">
            <h2>Products</h2>
            <a href="https://arabcomputers.com.sa/product-category/iphone/">iPhone</a>
            <a href="https://arabcomputers.com.sa/product-category/ipad/">iPad</a>
        </div>
        <div class="links-section">
            <h2>Information</h2>
            <a href="https://arabcomputers.com.sa/about-us/">About Us</a>
            <a href="https://arabcomputers.com.sa/terms-and-conditions/">Terms</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iejaflpeniiovjouvxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_z09VVn-Gx2Ulvxg0gv7WHQ_S6QE28Ex';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let html5QrCode;

        async function startScanning() {
            const readerDiv = document.getElementById('reader');
            readerDiv.style.display = 'block';
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                document.getElementById('numberInput').value = decodedText;
                html5QrCode.stop().then(() => {
                    readerDiv.style.display = 'none';
                    validateForm();
                });
            }).catch(() => {
                alert("Please ensure you are using HTTPS and allowed camera access.");
                readerDiv.style.display = 'none';
            });
        }

        async function validateForm() {
            const input = document.getElementById("numberInput").value.trim().toUpperCase();
            const resultElement = document.getElementById("result");
            if (!input) return;

            resultElement.textContent = "Checking...";
            try {
                const { data, error } = await _supabase.from('verification_codes').select('code').eq('code', input).maybeSingle();
                if (data) {
                    resultElement.innerHTML = "<span class='success'>✅ The code is correct</span>";
                } else {
                    resultElement.innerHTML = "<span class='error'>❌ Code not found</span>";
                }
            } catch (err) {
                resultElement.innerHTML = "<span class='error'>❌ Connection Error</span>";
            }
        }
    </script>
</body>
</html>
