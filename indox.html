<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty sticker validation</title>
    
    <!-- مكتبات Supabase و QR Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; color: #333; line-height: 1.6; }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; background-color: #fff; }
        
        /* تنسيق مربع الإدخال الموحد */
        .input-group {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 20px auto;
            max-width: 450px;
            padding: 0 10px;
        }

        .input-container {
            flex: 1;
            display: flex;
            border: 2px solid #cccccc;
            border-radius: 25px;
            overflow: hidden;
            height: 45px;
            background: white;
        }

        .input-container input {
            flex: 1;
            padding: 0 15px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        /* زر الكاميرا وزر التحقق بنفس اللون */
        .action-btn {
            background-color: #a8822b;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
            height: 45px;
        }

        .action-btn:hover { opacity: 0.9; }

        .scan-btn {
            width: 50px;
            border-radius: 25px;
        }

        .check-btn {
            padding: 0 20px;
            border-radius: 25px;
            font-size: 1rem;
            min-width: 80px;
        }

        /* نافذة الكاميرا */
        #reader {
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
            display: none;
            border: 2px solid #a8822b;
            border-radius: 10px;
        }

        /* التنسيقات الأخرى */
        #result { margin: 20px 0; min-height: 40px; font-weight: bold; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .banner { width: 100%; max-height: 200px; object-fit: cover; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Warranty sticker validation</h2>
        <p>Enter the code or scan the QR code<br>أدخل الرمز أو امسح الكود بالكاميرا</p>

        <!-- منطقة الكاميرا -->
        <div id="reader"></div>

        <div class="input-group">
            <div class="input-container">
                <input type="text" id="numberInput" placeholder="XXXXXX">
            </div>
            <!-- زر الكاميرا بنفس لون زر التحقق -->
            <button class="action-btn scan-btn" onclick="toggleScanner()" title="Scan QR">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M4 4h3V2H2v5h2V4zm14-2v2h3v3h2V2h-5zM2 22h5v-2H4v-3H2v5zm20-5v3h-3v2h5v-5h-2zM7 7h10v10H7V7zm2 2v6h6V9H9z"/></svg>
            </button>
            <button class="action-btn check-btn" id="checkBtn" onclick="validateForm()">Check</button>
        </div>

        <div id="result"></div>
        
        <img src="https://i.ibb.co/3m3r1TWK/Warranty-sticker-26.jpg" alt="Banner" class="banner">
    </div>

    <script>
        const SUPABASE_URL = 'https://iejaflpeniiovjouvxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_z09VVn-Gx2Ulvxg0gv7WHQ_S6QE28Ex';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let html5QrCode;
        let isScanning = false;

        async function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            
            if (!isScanning) {
                readerDiv.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                try {
                    await html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 10, qrbox: 250 },
                        (decodedText) => {
                            document.getElementById('numberInput').value = decodedText;
                            toggleScanner(); // إغلاق الكاميرا بعد القراءة
                            validateForm();  // التحقق تلقائياً
                        }
                    );
                    isScanning = true;
                } catch (err) {
                    alert("Camera error: " + err);
                    readerDiv.style.display = 'none';
                }
            } else {
                if (html5QrCode) {
                    await html5QrCode.stop();
                    readerDiv.style.display = 'none';
                    isScanning = false;
                }
            }
        }

        async function validateForm() {
            const input = document.getElementById("numberInput").value.trim().toUpperCase();
            const resultElement = document.getElementById("result");
            if (!input) return;

            resultElement.textContent = "Checking...";
            try {
                const { data, error } = await _supabase.from('verification_codes').select('code').eq('code', input).maybeSingle();
                if (data) {
                    resultElement.innerHTML = "<span class='success'>✅ The code is correct</span>";
                } else {
                    resultElement.innerHTML = "<span class='error'>❌ Code not found</span>";
                }
            } catch (err) {
                resultElement.innerHTML = "<span class='error'>❌ Connection Error</span>";
            }
        }
    </script>
</body>
</html>
