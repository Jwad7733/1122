<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-adsense-account" content="ca-pub-9178907045493989">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9178907045493989" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty sticker validation</title>
    
    <!-- مكتبة QR Code -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; color: #333; line-height: 1.6; padding-bottom: 80px; }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; background-color: #fff; }
        .header-content { text-align: left; margin-bottom: 30px; }
        .logo { width: 100px; margin-bottom: 10px; }
        .breadcrumb { font-size: 0.9rem; color: #777; margin: 10px 0 15px 0; }
        .breadcrumb a { color: #000 !important; text-decoration: none; }
        h2 { color: #2c3e50; font-size: 1.5rem; font-weight: 700; text-align: center; margin: 20px 0 40px 0; }
        .main-description { text-align: center; font-size: 1rem; line-height: 1.8; max-width: 800px; margin: 20px auto 30px auto; }
        
        /* تنسيق مستطيل التحقق */
        .input-container {
            width: 85%; /* مناسب للهاتف */
            max-width: 350px;
            display: flex;
            align-items: center;
            border: 2px solid #cccccc;
            border-radius: 25px 0 0 25px; /* يسار دائري، يمين حاد */
            overflow: hidden;
            margin: 10px auto;
            height: 45px;
            background: white;
        }

        .input-container input {
            flex: 1;
            padding: 0 15px;
            border: none;
            font-size: 0.9rem;
            outline: none;
            text-align: left;
            height: 100%;
        }

        .btn-action {
            height: 100%;
            border: none;
            background-color: #a8822b;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        .scan-btn {
            padding: 0 12px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .check-btn {
            padding: 0 20px;
            font-size: 0.9rem;
            min-width: 80px;
        }

        .btn-action:hover { opacity: 0.9; }

        /* نافذة الكاميرا */
        #reader-container { 
            display: none; 
            width: 100%; 
            max-width: 400px; 
            margin: 10px auto; 
            position: relative;
        }
        #reader { 
            width: 100%; 
            border: 2px solid #a8822b; 
            border-radius: 10px; 
            overflow: hidden; 
        }
        .close-scan {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }

        #result { margin: 20px auto; padding: 10px; font-size: 1.1rem; min-height: 50px; }
        .success { color: #28a745; font-weight: bold; }
        .error { color: #ff0000; font-weight: bold; }
        .banner { width: 100%; max-height: 200px; object-fit: cover; margin: 20px 0; }
        
        /* التنسيقات السفلية */
        .links { display: flex; flex-direction: column; text-align: left; padding: 20px; }
        .links-section { margin-bottom: 20px; }
        .links-section h2 { font-size: 1.2rem; margin-bottom: 10px; text-align: left; }
        .links-section a { color: #333; text-decoration: none; display: block; margin-bottom: 5px; font-size: 0.9rem; }
        
        .bottom-buttons { display: flex; justify-content: space-around; padding: 10px; background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-content">
            <img src="https://i.postimg.cc/zvf2c47L/image.png" alt="Logo" class="logo">
            <div class="breadcrumb"><a href="https://arabcomputers.com.sa/">Home</a> / Check sticker</div>
        </div>

        <h2>Warranty sticker validation</h2>
        <p class="main-description">Check if the warranty sticker on your product is genuine.<br>تأكد إذا كان ملصق الضمان الموجود على منتجك هو ملصق أصلي أو مزيف</p>

        <!-- حاوية الكاميرا -->
        <div id="reader-container">
            <button class="close-scan" onclick="stopScanning()">X إغلاق</button>
            <div id="reader"></div>
        </div>

        <div class="input-container">
            <input type="text" id="numberInput" placeholder="XXXXXX">
            <button class="btn-action scan-btn" onclick="startScanning()" title="Scan QR">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M4 4h3V2H2v5h2V4zm14-2v2h3v3h2V2h-5zM2 22h5v-2H4v-3H2v5zm20-5v3h-3v2h5v-5h-2zM7 7h10v10H7V7zm2 2v6h6V9H9z"/></svg>
            </button>
            <button class="btn-action check-btn" onclick="validateForm()">Check</button>
        </div>

        <div id="result"></div>
        
        <img src="https://i.ibb.co/3m3r1TWK/Warranty-sticker-26.jpg" alt="Banner" class="banner">
    </div>

    <script>
        let html5QrCode;

        async function startScanning() {
            const container = document.getElementById('reader-container');
            container.style.display = 'block';

            try {
                if (html5QrCode) { await html5QrCode.stop().catch(() => {}); }
                html5QrCode = new Html5Qrcode("reader");
                
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        document.getElementById('numberInput').value = decodedText;
                        stopScanning();
                        validateForm();
                    }
                );
            } catch (err) {
                console.error(err);
                if (location.protocol !== 'https:') {
                    alert("الكاميرا تعمل فقط على الروابط الآمنة HTTPS. يرجى التأكد من الرابط.");
                } else {
                    alert("خطأ في الوصول للكاميرا. تأكد من إعطاء الصلاحية للمتصفح.");
                }
                container.style.display = 'none';
            }
        }

        async function stopScanning() {
            if (html5QrCode) {
                await html5QrCode.stop().catch(() => {});
                document.getElementById('reader-container').style.display = 'none';
            }
        }

        function validateForm() {
            const input = document.getElementById("numberInput").value.trim().toUpperCase();
            const result = document.getElementById("result");
            if(!input) return;
            
            result.innerHTML = "جاري التحقق...";
            // ملاحظة: هنا يجب أن تضع كود قاعدة البيانات (batches) الذي كان لديك سابقاً
            // سأضع لك مثالاً بسيطاً للتحقق
            setTimeout(() => {
                // مثال: الرمز "123456" سيعتبر صحيحاً للتجربة
                if (input === "123456") {
                    result.innerHTML = "<span class='success'>The code is correct ✅ الرمز صحيح</span>";
                } else {
                    result.innerHTML = "<span class='error'>Code not found ❌ الرمز غير موجود</span>";
                }
            }, 500);
        }
    </script>
</body>
</html>
