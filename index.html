<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warranty sticker validation</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; color: #333; line-height: 1.6; padding-bottom: 80px; }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; background-color: #fff; }
        .header-content { text-align: left; margin-bottom: 30px; }
        .logo { width: 100px; margin-bottom: 10px; }
        .breadcrumb { font-size: 0.9rem; color: #777; margin: 10px 0 15px 0; }
        h2 { color: #2c3e50; font-size: 1.5rem; font-weight: 700; text-align: center; margin: 20px 0 40px 0; }
        .main-description { text-align: center; font-size: 1rem; line-height: 1.8; max-width: 800px; margin: 20px auto 30px auto; }
        
        /* تنسيق مستطيل التحقق (يسار دائري، يمين حاد) */
        .input-container {
            width: 90%;
            max-width: 350px;
            display: flex;
            align-items: center;
            border: 2px solid #cccccc;
            border-radius: 25px 0 0 25px;
            overflow: hidden;
            margin: 10px auto;
            height: 50px;
            background: white;
        }
        .input-container input { flex: 1; padding: 0 15px; border: none; font-size: 1rem; outline: none; height: 100%; }
        .btn-action { height: 100%; border: none; background-color: #a8822b; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .scan-btn { padding: 0 15px; border-right: 1px solid rgba(255,255,255,0.2); }
        .check-btn { padding: 0 20px; font-size: 0.9rem; min-width: 90px; font-weight: bold; }

        /* منطقة الكاميرا المتقدمة */
        #reader-wrapper { display: none; width: 100%; max-width: 400px; margin: 10px auto; position: relative; border: 2px solid #a8822b; border-radius: 15px; overflow: hidden; background: #000; }
        #reader { width: 100%; }
        .camera-controls { padding: 10px; background: #eee; display: flex; justify-content: space-around; }
        .cam-btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.8rem; }
        
        #result { margin: 20px auto; padding: 15px; font-size: 1.1rem; font-weight: bold; min-height: 60px; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .banner { width: 100%; max-height: 200px; object-fit: cover; margin: 20px 0; }

        /* الروابط والنصوص */
        .warning-message { color: red; margin: 20px 0; font-size: 0.9rem; padding: 10px; }
        .links { display: flex; flex-direction: column; text-align: left; padding: 20px; background: #f9f9f9; }
        .links-section { margin-bottom: 20px; }
        .links-section h2 { font-size: 1.1rem; margin-bottom: 10px; }
        .links-section a { color: #333; text-decoration: none; display: block; margin-bottom: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-content">
            <img src="https://i.postimg.cc/zvf2c47L/image.png" alt="Logo" class="logo">
            <div class="breadcrumb">Home / Check sticker</div>
        </div>

        <h2>Warranty sticker validation</h2>
        <p class="main-description">Check if the warranty sticker is genuine.<br>تأكد إذا كان ملصق الضمان أصلياً</p>

        <!-- منطقة الكاميرا -->
        <div id="reader-wrapper">
            <div id="reader"></div>
            <div class="camera-controls">
                <button class="cam-btn" style="background:#dc3545; color:white;" onclick="stopScanning()">إغلاق X</button>
                <button class="cam-btn" style="background:#a8822b; color:white;" onclick="document.getElementById('file-input').click()">مسح صورة من الاستوديو 📷</button>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="scanFile(this)">
        </div>

        <div class="input-container">
            <input type="text" id="numberInput" placeholder="أدخل الرقم هنا">
            <button class="btn-action scan-btn" onclick="startScanning()" title="فتح الكاميرا">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M4 4h3V2H2v5h2V4zm14-2v2h3v3h2V2h-5zM2 22h5v-2H4v-3H2v5zm20-5v3h-3v2h5v-5h-2zM7 7h10v10H7V7zm2 2v6h6V9H9z"/></svg>
            </button>
            <button class="btn-action check-btn" onclick="validateForm()">Check</button>
        </div>

        <div id="result"></div>
        <img src="https://i.ibb.co/3m3r1TWK/Warranty-sticker-26.jpg" alt="Banner" class="banner">

        <div class="warning-message">
            <strong>تنبيه هام:</strong> نحذر من وجود ملصقات مزورة. تأكد أن الرابط هو:<br>
            <a href="https://arabcomputers.com.sa/">arabcomputers.com.sa</a>
        </div>
    </div>

    <div class="links">
        <div class="links-section">
            <h2>Useful Links</h2>
            <a href="https://arabcomputers.com.sa/">Home</a>
            <a href="https://arabcomputers.com.sa/contact/">Contact Us</a>
        </div>
        <div class="links-section">
            <h2>Products</h2>
            <a href="https://arabcomputers.com.sa/product-category/iphone/">iPhone</a>
            <a href="https://arabcomputers.com.sa/product-category/ipad/">iPad</a>
        </div>
    </div>

    <script>
        let html5QrCode;
        const resultDiv = document.getElementById('result');

        // 1. بدء الكاميرا (طريقة الخبير)
        async function startScanning() {
            const wrapper = document.getElementById('reader-wrapper');
            wrapper.style.display = 'block';
            resultDiv.innerHTML = "جاري تشغيل الكاميرا...";

            try {
                if (html5QrCode) await html5QrCode.stop().catch(() => {});
                html5QrCode = new Html5Qrcode("reader");

                const config = { fps: 10, qrbox: { width: 250, height: 250 } };

                // محاولة التشغيل مع معالجة آيفون
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    (text) => { document.getElementById('numberInput').value = text; stopScanning(); validateForm(); }
                );
                resultDiv.innerHTML = "";
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = "<span class='error'>تعذر فتح الكاميرا المباشرة. يرجى استخدام زر 'مسح صورة من الاستوديو' بالأسفل.</span>";
            }
        }

        // 2. ميزة الخبير: مسح من ملف (تعمل 100% حتى لو الكاميرا سوداء)
        function scanFile(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const scanner = new Html5Qrcode("reader");
            resultDiv.innerHTML = "جاري تحليل الصورة...";
            scanner.scanFile(file, true)
                .then(text => { document.getElementById('numberInput').value = text; stopScanning(); validateForm(); })
                .catch(err => { resultDiv.innerHTML = "<span class='error'>لم يتم العثور على كود في الصورة. حاول التقاط صورة أوضح.</span>"; });
        }

        async function stopScanning() {
            if (html5QrCode) await html5QrCode.stop().catch(() => {});
            document.getElementById('reader-wrapper').style.display = 'none';
        }

        // 3. التحقق (قاعدة البيانات)
        function validateForm() {
            const code = document.getElementById('numberInput').value.trim().toUpperCase();
            if (!code) return;
            resultDiv.innerHTML = "جاري التحقق...";
            
            // مثال للتحقق (استبدله بمنطق batches الخاص بك)
            setTimeout(() => {
                if (code === "TEST123") {
                    resultDiv.innerHTML = "<span class='success'>✅ الرمز صحيح</span>";
                } else {
                    resultDiv.innerHTML = "<span class='error'>❌ الرمز غير موجود</span>";
                }
            }, 600);
        }
    </script>
</body>
</html>
