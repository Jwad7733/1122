<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warranty sticker validation</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; color: #333; line-height: 1.6; padding-bottom: 80px; }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; background-color: #fff; }
        .header-content { text-align: left; margin-bottom: 30px; }
        .logo { width: 100px; margin-bottom: 10px; }
        .breadcrumb { font-size: 0.9rem; color: #777; margin: 10px 0 15px 0; }
        h2 { color: #2c3e50; font-size: 1.5rem; font-weight: 700; text-align: center; margin: 20px 0 40px 0; }
        .main-description { text-align: center; font-size: 1rem; line-height: 1.8; max-width: 800px; margin: 20px auto 30px auto; }
        
        /* تنسيق مستطيل التحقق المطلوب */
        .input-container {
            width: 90%;
            max-width: 350px;
            display: flex;
            align-items: center;
            border: 2px solid #cccccc;
            border-radius: 25px 0 0 25px; /* يسار دائري، يمين حاد */
            overflow: hidden;
            margin: 10px auto;
            height: 50px;
            background: white;
        }
        .input-container input { flex: 1; padding: 0 15px; border: none; font-size: 1rem; outline: none; height: 100%; text-align: left; }
        .btn-action { height: 100%; border: none; background-color: #a8822b; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .scan-btn { padding: 0 15px; border-right: 1px solid rgba(255,255,255,0.2); }
        .check-btn { padding: 0 20px; font-size: 0.9rem; min-width: 90px; font-weight: bold; }

        /* واجهة الكاميرا الاحترافية */
        #camera-expert-ui { 
            display: none; 
            width: 95%; 
            max-width: 400px; 
            margin: 20px auto; 
            padding: 20px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            background: #fff; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: right; /* للغة العربية */
            direction: rtl;
        }
        .expert-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; color: #333; display: block; text-align: center; }
        .cam-select-label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #666; }
        #camera-select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
            margin-bottom: 15px; 
            font-size: 0.9rem;
            background: #f9f9f9;
        }
        .start-scan-btn { 
            width: 100%; 
            padding: 12px; 
            background-color: #a8822b; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 15px;
        }
        .file-scan-option { 
            display: block; 
            text-align: center; 
            color: #a8822b; 
            text-decoration: underline; 
            cursor: pointer; 
            font-size: 0.9rem;
        }
        #reader { width: 100%; margin-top: 15px; border-radius: 8px; overflow: hidden; background: #000; display: none; }
        
        #result { margin: 20px auto; padding: 15px; font-size: 1.1rem; font-weight: bold; min-height: 60px; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .banner { width: 100%; max-height: 200px; object-fit: cover; margin: 20px 0; }

        /* الروابط والتحذير */
        .warning-message { color: red; margin: 20px 0; padding: 15px; text-align: center; font-size: 0.9rem; border: 1px dashed red; border-radius: 10px; }
        .links { display: flex; flex-wrap: wrap; justify-content: space-between; margin-top: 40px; text-align: left; padding: 20px; background: #f9f9f9; }
        .links-section { flex: 1; min-width: 200px; margin-bottom: 20px; }
        .links-section a { color: #333; text-decoration: none; display: block; margin-bottom: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-content">
            <img src="https://i.postimg.cc/zvf2c47L/image.png" alt="Logo" class="logo">
            <div class="breadcrumb">Home / Check sticker</div>
        </div>

        <h2>Warranty sticker validation</h2>
        <p class="main-description">Check if the warranty sticker on your product is genuine.<br>تأكد إذا كان ملصق الضمان أصلياً</p>

        <div class="input-container">
            <input type="text" id="numberInput" placeholder="أدخل الرقم هنا">
            <button class="btn-action scan-btn" onclick="toggleExpertUI()" title="فتح خيارات الكاميرا">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M4 4h3V2H2v5h2V4zm14-2v2h3v3h2V2h-5zM2 22h5v-2H4v-3H2v5zm20-5v3h-3v2h5v-5h-2zM7 7h10v10H7V7zm2 2v6h6V9H9z"/></svg>
            </button>
            <button class="btn-action check-btn" onclick="validateForm()">Check</button>
        </div>

        <!-- واجهة الخبير المطلوبة -->
        <div id="camera-expert-ui">
            <span class="expert-title">المسح الضوئي القائم على الكاميرا</span>
            
            <label class="cam-select-label" id="cam-count-label">اختر الكاميرا (جاري البحث...)</label>
            <select id="camera-select">
                <option value="">جاري تحميل الكاميرات...</option>
            </select>
            
            <button class="start-scan-btn" onclick="startExpertScan()">ابدأ المسح</button>
            
            <span class="file-scan-option" onclick="document.getElementById('file-input').click()">مسح ملف صورة ضوئيًا</span>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="scanFile(this)">
            
            <div id="reader"></div>
            <button id="stop-btn" class="start-scan-btn" style="background:#dc3545; margin-top:10px; display:none;" onclick="stopScanning()">إيقاف المسح</button>
        </div>

        <div id="result"></div>
        <img src="https://i.ibb.co/3m3r1TWK/Warranty-sticker-26.jpg" alt="Banner" class="banner">

        <div class="warning-message">
            <strong>تنبيه:</strong> نحذر من الملصقات المزورة. الرابط الرسمي: arabcomputers.com.sa
        </div>
    </div>

    <script>
        let html5QrCode;
        const resultDiv = document.getElementById('result');
        const cameraSelect = document.getElementById('camera-select');
        const camCountLabel = document.getElementById('cam-count-label');

        // تبديل ظهور واجهة الخبير
        async function toggleExpertUI() {
            const ui = document.getElementById('camera-expert-ui');
            if (ui.style.display === 'block') {
                ui.style.display = 'none';
                stopScanning();
            } else {
                ui.style.display = 'block';
                loadCameras();
            }
        }

        // تحميل قائمة الكاميرات
        async function loadCameras() {
            try {
                const devices = await Html5Qrcode.getCameras();
                cameraSelect.innerHTML = '';
                if (devices && devices.length > 0) {
                    camCountLabel.innerText = `اختر الكاميرا (${devices.length})`;
                    devices.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.id;
                        // تسمية الكاميرا كما طلبت
                        const label = device.label || `الكاميرا ${index}، مواجهة للـ ${index === 0 ? 'خلف' : 'أمام'}`;
                        option.text = label;
                        cameraSelect.appendChild(option);
                    });
                } else {
                    camCountLabel.innerText = "لم يتم العثور على كاميرات";
                    cameraSelect.innerHTML = '<option value="">لا توجد كاميرا متاحة</option>';
                }
            } catch (err) {
                camCountLabel.innerText = "خطأ في الوصول للكاميرا";
                console.error(err);
            }
        }

        // بدء المسح اليدوي
        async function startExpertScan() {
            const cameraId = cameraSelect.value;
            if (!cameraId) {
                alert("يرجى اختيار كاميرا أولاً");
                return;
            }

            const readerDiv = document.getElementById('reader');
            const stopBtn = document.getElementById('stop-btn');
            readerDiv.style.display = 'block';
            stopBtn.style.display = 'block';

            try {
                if (html5QrCode) await html5QrCode.stop().catch(() => {});
                html5QrCode = new Html5Qrcode("reader");

                await html5QrCode.start(
                    cameraId, 
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (text) => {
                        document.getElementById('numberInput').value = text;
                        stopScanning();
                        validateForm();
                    }
                );
            } catch (err) {
                alert("تعذر بدء الكاميرا المختارة. تأكد من منح الصلاحيات.");
            }
        }

        // مسح من ملف
        function scanFile(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const scanner = new Html5Qrcode("reader");
            resultDiv.innerHTML = "جاري تحليل الصورة...";
            scanner.scanFile(file, true)
                .then(text => {
                    document.getElementById('numberInput').value = text;
                    resultDiv.innerHTML = "✅ تم استخراج الكود بنجاح";
                    validateForm();
                })
                .catch(err => {
                    resultDiv.innerHTML = "<span class='error'>لم يتم العثور على كود. حاول مرة أخرى.</span>";
                });
        }

        async function stopScanning() {
            if (html5QrCode) await html5QrCode.stop().catch(() => {});
            document.getElementById('reader').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'none';
        }

        function validateForm() {
            const code = document.getElementById('numberInput').value.trim().toUpperCase();
            if (!code) return;
            resultDiv.innerHTML = "Checking...";
            setTimeout(() => {
                // منطق التحقق الخاص بك هنا
                resultDiv.innerHTML = "<span class='error'>❌ الرمز غير موجود</span>";
            }, 500);
        }
    </script>
</body>
</html>
